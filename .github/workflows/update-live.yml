name: 야구 당일 결과 빠른 갱신 (토)

on:
  schedule:
    # 토요일 12:00~23:30 KST 30분마다 (UTC 03:00~14:30 토요일)
    # 당일 경기 결과가 소스에 올라오는 대로 빠르게 반영 (현재 시즌만, 가볍게)
    - cron: '*/30 3-14 * * 6'
  workflow_dispatch:

permissions:
  contents: write

# 무거운 전체 스크랩(update-data.yml)과 같은 그룹 → 동시에 돌지 않고 순차 실행 (git push 충돌 방지)
concurrency:
  group: baseball-data
  cancel-in-progress: false

jobs:
  live-update:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 설치
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 전체 스크래핑 (2025 + 2026)
        timeout-minutes: 15
        run: node scripts/scrape-all.js

      - name: 예정 경기 구장 보강 (ksbsa)
        timeout-minutes: 5
        run: node scripts/fill-ksbsa-scheduled-locations.js
        continue-on-error: true

      - name: 엔트리 헤더 재계산 (record / W / L / D / G)
        timeout-minutes: 2
        run: node scripts/recalc-headers.js

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 당일 결과 갱신 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
            echo "✅ 푸시 완료"
          fi
