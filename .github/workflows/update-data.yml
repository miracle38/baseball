name: 야구 데이터 자동 업데이트

on:
  schedule:
    # 하루 2회: 매일 03:00 KST, 15:00 KST (UTC 18:00 전날, UTC 06:00)
    # 주말 경기 후 빠르게 갱신 + 평일에도 DB 싱크
    - cron: '0 18 * * *'
    - cron: '0 6 * * *'
    # 추가: 주말(토·일) 저녁 22:00 KST (UTC 13:00) — 당일 경기 결과를 더 빨리 반영
    - cron: '0 13 * * 6,0'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

# 당일 빠른 갱신(update-live.yml)과 같은 그룹 → 동시에 돌지 않고 순차 실행 (git push 충돌 방지)
concurrency:
  group: baseball-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Playwright 설치
        run: |
          npm install playwright
          npx playwright install chromium --with-deps

      - name: 전체 스크래핑 (2025 + 2026)
        timeout-minutes: 15
        run: node scripts/scrape-all.js

      - name: 팀순위 스크래핑 (gameone 전체)
        timeout-minutes: 10
        run: node scripts/scrape-rankings.js
        continue-on-error: true

      - name: 팀순위 스크래핑 (ksbsa / dbsa)
        timeout-minutes: 10
        run: node scripts/scrape-rankings-ksbsa-dbsa.js
        continue-on-error: true

      - name: 경기 기록 & RS/RA 스크래핑 (gameone 전체)
        timeout-minutes: 15
        run: node scripts/scrape-games.js
        continue-on-error: true

      - name: 박스스코어 스크래핑 (gameone)
        timeout-minutes: 30
        run: node scripts/scrape-gameone-boxscore.js
        continue-on-error: true

      - name: 박스스코어 스크래핑 (ksbsa / dbsa)
        timeout-minutes: 30
        run: node scripts/scrape-ksbsa-boxscore.js
        continue-on-error: true

      - name: 예정 경기 구장 보강 (ksbsa)
        timeout-minutes: 5
        run: node scripts/fill-ksbsa-scheduled-locations.js
        continue-on-error: true

      - name: 엔트리 헤더 재계산 (record / W / L / D / G)
        timeout-minutes: 2
        run: node scripts/recalc-headers.js

      - name: 변경사항 커밋 & 푸시
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "변경사항 없음"
          else
            git commit -m "🤖 자동 데이터 업데이트 $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
            git push
            echo "✅ 푸시 완료"
          fi
